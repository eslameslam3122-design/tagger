workflows:
  windows-build:
    name: 🪟 Build Windows EXE
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: 📦 تنظيف وتحميل المكتبات
        script: |
          flutter clean
          flutter pub get
      - name: 🛠️ بناء Windows EXE
        script: |
          flutter config --enable-windows-desktop
          flutter build windows --release
    artifacts:
      - build/windows/runner/Release/*
    publishing:
      email:
        recipients:
          - your-email@example.com